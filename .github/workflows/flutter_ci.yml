name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Análisis estático + tests unitarios
  # ─────────────────────────────────────────────────────────────
  test:
    name: Analyze & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Crea un .env de prueba mínimo para que dotenv no falle
      - name: Create .env for tests
        run: |
          echo "API_BASE_URL=http://localhost:8080" >> .env
          echo "API_KEY=test-key"                  >> .env

      - name: Dart analyze
        run: flutter analyze --fatal-infos

      - name: Run unit tests (with coverage)
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 2. Build Android (debug) — verifica que compila
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'http://localhost:8080' }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY || 'ci-key' }}"                          >> .env

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 3. Build iOS (sin firma) — solo en macOS
  # ─────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    needs: test
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'http://localhost:8080' }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY || 'ci-key' }}"                          >> .env

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
